name: Storybook Smoke Tests

on: pull_request

# Cancels all previous workflow runs for pull requests that have not completed.
concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'WordPress/gutenberg' || github.event_name == 'pull_request' }}

        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
              with:
                  show-progress: ${{ runner.debug == '1' && 'true' || 'false' }}

            - name: Setup Node.js and install dependencies
              uses: ./.github/setup-node

            - name: Build Storybook
              run: npm run storybook:build

            - name: Install Playwright browsers
              run: npx playwright install

            - name: Start Storybook
              run: npm run storybook:dev & echo $! > storybook_pid.txt & sleep 600
              # Stores the process ID and waits for up to 10 minutes

            - name: Run Storybook smoke tests
              run: NODE_PATH=./node_modules npx --package=@storybook/test-runner -- test-storybook --url http://localhost:50240 --config-dir ./storybook

            - name: Stop Storybook server
              if: always()
              run: |
                  if [ -f storybook_pid.txt ]; then
                    PID=$(cat storybook_pid.txt)
                    kill $PID || true
                    echo "Storybook server (PID: $PID) stopped"
                  fi
