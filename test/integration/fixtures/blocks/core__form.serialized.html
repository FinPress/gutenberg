<!-- fp:form -->
<form class="fp-block-form" enctype="text/plain"><!-- fp:form-input -->
<div class="fp-block-form-input"><label class="fp-block-form-input__label"><span class="fp-block-form-input__label-content">Name</span><input class="fp-block-form-input__input" type="text" name="name" required aria-required="true"/></label></div>
<!-- /fp:form-input -->

<!-- fp:form-input {"type":"email"} -->
<div class="fp-block-form-input"><label class="fp-block-form-input__label"><span class="fp-block-form-input__label-content">Email</span><input class="fp-block-form-input__input" type="email" name="email" required aria-required="true"/></label></div>
<!-- /fp:form-input -->

<!-- fp:form-input {"type":"url"} -->
<div class="fp-block-form-input"><label class="fp-block-form-input__label"><span class="fp-block-form-input__label-content">Website</span><input class="fp-block-form-input__input" type="url" name="website" aria-required="false"/></label></div>
<!-- /fp:form-input -->

<!-- fp:form-input {"type":"textarea"} -->
<div class="fp-block-form-input"><label class="fp-block-form-input__label"><span class="fp-block-form-input__label-content">Comment</span><textarea class="fp-block-form-input__input" name="comment" required aria-required="true"></textarea></label></div>
<!-- /fp:form-input -->

<!-- fp:form-submit-button -->
<div class="fp-block-form-submit-button"><!-- fp:buttons -->
<div class="fp-block-buttons"><!-- fp:button {"tagName":"button","type":"submit"} -->
<div class="fp-block-button"><button type="submit" class="fp-block-button__link fp-element-button">Submit</button></div>
<!-- /fp:button --></div>
<!-- /fp:buttons --></div>
<!-- /fp:form-submit-button --></form>
<!-- /fp:form -->
