<!-- fin:form -->
<form class="fin-block-form" enctype="text/plain">
<!-- fin:form-input -->
<div class="fin-block-form-input"><label class="fin-block-form-input__label"><span class="fin-block-form-input__label-content">Name</span><input class="fin-block-form-input__input" type="text" name="name" required aria-required="true"/></label></div>
<!-- /fin:form-input -->

<!-- fin:form-input {"type":"email"} -->
<div class="fin-block-form-input"><label class="fin-block-form-input__label"><span class="fin-block-form-input__label-content">Email</span><input class="fin-block-form-input__input" type="email" name="email" required aria-required="true"/></label></div>
<!-- /fin:form-input -->

<!-- fin:form-input {"type":"url"} -->
<div class="fin-block-form-input"><label class="fin-block-form-input__label"><span class="fin-block-form-input__label-content">Website</span><input class="fin-block-form-input__input" type="url" name="website" aria-required="false"/></label></div>

<!-- /fin:button --></div>
<!-- /fin:buttons --></div>
<!-- /fin:form-submit-button -->
</form>
