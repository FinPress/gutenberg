<!-- wp:progress-meter -->
<div class="wp-block-progress-meter">
	<div class="wp-block-progress-meter__container">
		<div>
			<p class="wp-block-progress-meter__label"></p>
			<p>50%</p>
		</div>
		<div
			style="background-color: #f0f0f0; height: 11px"
			class="wp-block-progress-meter__bar"
		>
			<div
				style="background-color: #1e1e1e; width: 50%"
				class="wp-block-progress-meter__progress"
			></div>
		</div>
	</div>
</div>
<!-- /wp:progress-meter -->
